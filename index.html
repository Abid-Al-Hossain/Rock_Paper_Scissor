<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissor</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="hero">
      <h1>Rock Paper Scissor</h1>
      <p class="hero-text">Pick a move with the buttons below or use the keyboard shortcuts <strong>R</strong>, <strong>P</strong>, and <strong>S</strong>.</p>
    </header>

    <section class="choices" aria-label="Available moves">
      <div class="choice-item">
        <button class="choice" id="rock" type="button" aria-label="Choose rock">
          <img src="./image/rock.png" alt="Rock">
        </button>
        <p class="choice-label">Rock - R</p>
      </div>
      <div class="choice-item">
        <button class="choice" id="paper" type="button" aria-label="Choose paper">
          <img src="./image/paper.png" alt="Paper">
        </button>
        <p class="choice-label">Paper - P</p>
      </div>
      <div class="choice-item">
        <button class="choice" id="scissors" type="button" aria-label="Choose scissors">
          <img src="./image/scissors.png" alt="Scissors">
        </button>
        <p class="choice-label">Scissors - S</p>
      </div>
    </section>

    <section class="score-board" aria-label="Score board">
      <article class="score">
        <div class="choice1">
          <img src="" alt="Your selected move">
        </div>
        <p id="user-score">0</p>
        <p class="score-label">You</p>
      </article>
      <article class="score">
        <div class="choice2">
          <img src="" alt="Computer selected move">
        </div>
        <p id="comp-score">0</p>
        <p class="score-label">Computer</p>
      </article>
    </section>

    <div class="msg-con">
      <p id="msg" aria-live="polite">Play your move</p>
    </div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
